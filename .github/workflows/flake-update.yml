name: Update Flake & Packages

on:
  schedule:
    # Run weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-flake:
    name: Update Flake Lock & Package Versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: openchamber-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
        continue-on-error: true

      - name: Update flake.lock
        run: nix flake update

      - name: Check and update OpenChamber package
        run: nix run nixpkgs#nix-update -- --flake openchamber
        continue-on-error: true

      - name: Regenerate options documentation
        run: nix run .#generate-docs

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: dev
          branch: automated/weekly-flake-update
          commit-message: "chore: weekly flake lock, package version & docs update"
          title: "chore: weekly flake lock, package version & docs update"
          body: |
            Automated weekly updates generated by GitHub Actions.

            This PR includes updates for:
            - Flake lock file inputs (`flake.lock`)
            - Upstream OpenChamber package version (via `nix-update`)
            - Auto-generated NixOS and Home Manager options docs (`docs/`)

            CI checks will run automatically on this PR targeting the `dev` branch.
          labels: |
            updates
            automated-pr
          delete-branch: true

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
